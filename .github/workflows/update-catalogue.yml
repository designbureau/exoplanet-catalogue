name: Update Exoplanet Catalogue

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone latest Open Exoplanet Catalogue
        run: |
          git clone --depth 1 https://github.com/OpenExoplanetCatalogue/open_exoplanet_catalogue.git /tmp/oec

      - name: Sync systems with rsync
        id: sync
        run: |
          SRC="/tmp/oec/systems/"
          DEST="app/data/open_exoplanet_catalogue/systems/"

          BEFORE=$(find "$DEST" -maxdepth 1 -name '*.xml' | wc -l)

          # Sync: copy new/updated, delete removed
          CHANGES=$(rsync -a --delete --itemize-changes "$SRC" "$DEST" | grep '\.xml$' || true)

          AFTER=$(find "$DEST" -maxdepth 1 -name '*.xml' | wc -l)
          COUNT=$(echo "$CHANGES" | grep -c '[^ ]' || echo 0)

          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "total=$AFTER" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected. ($AFTER systems)"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$COUNT files changed ($BEFORE → $AFTER systems)"
            echo "$CHANGES" | head -20
          fi

      - name: Commit and push changes
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A app/data/open_exoplanet_catalogue/systems/
          git commit -m "Update exoplanet catalogue: ${{ steps.sync.outputs.count }} files changed (${{ steps.sync.outputs.total }} systems)"
          git push
