name: Update Exoplanet Catalogue

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone latest Open Exoplanet Catalogue
        run: |
          git clone --depth 1 https://github.com/OpenExoplanetCatalogue/open_exoplanet_catalogue.git /tmp/oec

      - name: Compare and update systems
        id: sync
        run: |
          SRC="/tmp/oec/systems"
          DEST="app/data/open_exoplanet_catalogue/systems"

          # Count changes
          ADDED=0
          UPDATED=0
          REMOVED=0

          # Copy new and updated files
          for f in "$SRC"/*.xml; do
            name=$(basename "$f")
            if [ ! -f "$DEST/$name" ]; then
              cp "$f" "$DEST/$name"
              ADDED=$((ADDED + 1))
            elif ! diff -q "$f" "$DEST/$name" > /dev/null 2>&1; then
              cp "$f" "$DEST/$name"
              UPDATED=$((UPDATED + 1))
            fi
          done

          # Remove systems no longer in upstream
          for f in "$DEST"/*.xml; do
            name=$(basename "$f")
            if [ ! -f "$SRC/$name" ]; then
              rm "$f"
              REMOVED=$((REMOVED + 1))
            fi
          done

          TOTAL_BEFORE=$(ls "$DEST"/*.xml 2>/dev/null | wc -l)

          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "updated=$UPDATED" >> "$GITHUB_OUTPUT"
          echo "removed=$REMOVED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL_BEFORE" >> "$GITHUB_OUTPUT"

          if [ $ADDED -eq 0 ] && [ $UPDATED -eq 0 ] && [ $REMOVED -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes: +$ADDED new, ~$UPDATED updated, -$REMOVED removed ($TOTAL_BEFORE total)"
          fi

      - name: Commit and push changes
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/open_exoplanet_catalogue/systems/
          git commit -m "Update exoplanet catalogue: +${{ steps.sync.outputs.added }} new, ~${{ steps.sync.outputs.updated }} updated, -${{ steps.sync.outputs.removed }} removed (${{ steps.sync.outputs.total }} total)"
          git push
