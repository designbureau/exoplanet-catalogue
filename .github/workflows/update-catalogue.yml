name: Update Exoplanet Catalogue

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Sync fork with upstream
        run: |
          cd app/data/open_exoplanet_catalogue
          git remote add upstream https://github.com/OpenExoplanetCatalogue/open_exoplanet_catalogue.git 2>/dev/null || true
          git fetch upstream
          BEFORE=$(git rev-parse HEAD)
          git checkout master || git checkout main
          git merge upstream/master --no-edit || git merge upstream/main --no-edit
          AFTER=$(git rev-parse HEAD)

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "No upstream changes."
            echo "changed=false" >> "$GITHUB_ENV"
          else
            COMMITS=$(git log --oneline "$BEFORE".."$AFTER" | wc -l)
            echo "$COMMITS new commits from upstream"
            echo "changed=true" >> "$GITHUB_ENV"
            echo "commits=$COMMITS" >> "$GITHUB_ENV"
          fi

      - name: Push updated fork
        if: env.changed == 'true'
        run: |
          cd app/data/open_exoplanet_catalogue
          git push origin HEAD

      - name: Update submodule reference
        if: env.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/open_exoplanet_catalogue
          git commit -m "Update exoplanet catalogue submodule (${{ env.commits }} upstream commits)"
          git push
